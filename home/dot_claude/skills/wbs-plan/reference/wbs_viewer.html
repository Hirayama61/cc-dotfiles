<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>案件WBS Viewer</title>
</head>
<body>
<style>
  :root {
    --bg: #eef1f5;
    --paper: #fbfcfd;
    --ink: #18222e;
    --muted: #5a6878;
    --faint: #8b97a6;
    --hair: #d8dee7;
    --hair-strong: #c2cbd6;
    --accent: #0e6e78;
    --accent-ink: #0a4f57;
    --grid: #dde6ee;
    --s-todo: #8a96a6;
    --s-doing: #c2740a;
    --s-pr: #2563c9;
    --s-review: #6d44c4;
    --s-merged: #1f9254;
    --block: #cf3434;
    --block-bg: #fbecec;
    --warn-bg: #fcf3e3;
    --ok-bg: #e9f5ee;
    --radius: 9px;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", "JetBrains Mono", "Menlo", "Consolas", monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 22px 80px; }

  /* ---- top bar ---- */
  .topbar {
    display: flex; flex-wrap: wrap; align-items: flex-end; gap: 16px 24px;
    border: 1px solid var(--hair-strong);
    border-top: 3px solid var(--accent);
    background: var(--paper);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: 0 1px 0 rgba(24,34,46,.03);
  }
  .topbar .lead { flex: 1 1 360px; min-width: 260px; }
  .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--accent-ink); margin: 0 0 4px;
  }
  h1 { font-size: 23px; line-height: 1.2; margin: 0; letter-spacing: -.01em; text-wrap: balance; }
  .sources { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-top: 9px; font-size: 12.5px; }
  .sources a { color: var(--accent-ink); text-decoration: none; border-bottom: 1px solid var(--hair-strong); }
  .sources a:hover { border-color: var(--accent); }
  .sources span.k { color: var(--faint); font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
  .meta { text-align: right; font-size: 12px; color: var(--muted); }
  .meta .stamp { font-family: var(--mono); }
  .btn {
    font: inherit; font-size: 12.5px; cursor: pointer;
    background: var(--accent); color: #fff; border: 0;
    padding: 8px 14px; border-radius: 7px; margin-top: 8px;
  }
  .btn:hover { background: var(--accent-ink); }
  .btn:focus-visible { outline: 2px solid var(--accent-ink); outline-offset: 2px; }

  /* ---- summary ---- */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 18px 0; }
  .stat { background: var(--paper); border: 1px solid var(--hair); border-radius: var(--radius); padding: 13px 15px; }
  .stat .n { font-size: 26px; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
  .stat .l { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .stat.alert { border-color: var(--block); background: var(--block-bg); }
  .stat.alert .n { color: var(--block); }
  .ramp { display: flex; height: 7px; border-radius: 4px; overflow: hidden; margin-top: 10px; background: var(--hair); }
  .ramp i { display: block; height: 100%; }
  .ramp-legend { display: flex; flex-wrap: wrap; gap: 4px 12px; margin-top: 9px; font-size: 11px; color: var(--muted); }
  .ramp-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .ramp-legend b { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }

  /* ---- filters ---- */
  .filters { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px; margin: 6px 0 20px; font-size: 12.5px; }
  .filters .grp { display: inline-flex; align-items: center; gap: 6px; }
  .filters label.t { color: var(--faint); font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
  .seg { display: inline-flex; border: 1px solid var(--hair-strong); border-radius: 7px; overflow: hidden; }
  .seg button { font: inherit; font-size: 12px; border: 0; background: var(--paper); color: var(--muted); padding: 5px 11px; cursor: pointer; }
  .seg button[aria-pressed="true"] { background: var(--accent); color: #fff; }
  .seg button:focus-visible { outline: 2px solid var(--accent-ink); outline-offset: -2px; }
  .toggle { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; }
  .toggle input { accent-color: var(--block); width: 15px; height: 15px; }

  /* ---- section heads ---- */
  h2 {
    font-size: 13px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .1em;
    color: var(--accent-ink); margin: 34px 0 14px; padding-bottom: 7px;
    border-bottom: 1px solid var(--hair-strong);
    display: flex; align-items: baseline; gap: 10px;
  }
  h2 .c { color: var(--faint); font-size: 12px; letter-spacing: 0; }

  /* ---- WBS table ---- */
  .wbs-wrap { overflow-x: auto; border: 1px solid var(--hair-strong); border-radius: var(--radius); }
  td.c-screen { width: 196px; background: #f4f7fb; vertical-align: top; }
  td.c-screen .ord { font-family: var(--mono); font-size: 11px; color: #fff; background: var(--accent); border-radius: 5px; padding: 2px 8px; }
  td.c-screen .snm { font-weight: 600; font-size: 14px; display: block; margin-top: 7px; line-height: 1.3; }
  td.c-screen .sid { font-family: var(--mono); font-size: 10.5px; color: var(--faint); }
  td.c-screen .cnt { font-size: 11px; color: var(--muted); margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  td.c-screen .blk { color: var(--block); font-weight: 600; }
  td.c-feat { width: 218px; vertical-align: top; }
  td.c-feat .fname { font-weight: 550; font-size: 13px; }
  td.c-feat .fid { font-family: var(--mono); font-size: 10.5px; color: var(--faint); display: block; margin-top: 1px; }
  td.c-feat .chips { margin-top: 6px; }
  td.c-area { font-family: var(--mono); font-weight: 700; font-size: 11px; text-align: center; width: 46px; }
  td.c-st { white-space: nowrap; width: 118px; }
  td.c-pr { font-family: var(--mono); font-size: 11px; white-space: nowrap; width: 72px; }
  td.c-pr a { color: var(--accent-ink); text-decoration: none; border-bottom: 1px solid var(--hair-strong); }
  .stbadge { display: inline-flex; align-items: center; gap: 7px; }
  .stbadge .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  tr.blocked td { background: var(--block-bg); }
  tr.blocked td.c-area, tr.blocked .stbadge { color: var(--block); font-weight: 600; }
  .chips { display: inline-flex; flex-wrap: wrap; gap: 5px; }
  .chip { font-family: var(--mono); font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 1px solid transparent; cursor: help; }
  .chip.q { background: var(--block-bg); color: var(--block); border-color: #eecccc; }
  .chip.q.soft { background: var(--warn-bg); color: #9a6209; border-color: #ecd9b3; }
  .chip.cm { background: #e8f0f1; color: var(--accent-ink); border-color: #c4d8da; }

  /* ---- tables ---- */
  .tbl-wrap { overflow-x: auto; border: 1px solid var(--hair-strong); border-radius: var(--radius); }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th { text-align: left; font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 600; padding: 9px 12px; background: #eef2f7; border: 1px solid var(--hair-strong); white-space: nowrap; }
  td { padding: 9px 12px; border: 1px solid var(--hair); vertical-align: top; background: #fff; }
  td.id, td.mono { font-family: var(--mono); font-size: 11.5px; white-space: nowrap; }
  .grouphdr td { background: #f1f4f8; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent-ink); }
  tr.q-unresolved-human td { box-shadow: inset 3px 0 0 var(--block); }
  tr.q-unresolved-human td.id { color: var(--block); }
  .pill { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }
  .pill.open { background: var(--block-bg); color: var(--block); }
  .pill.checking { background: var(--warn-bg); color: #9a6209; }
  .pill.resolved { background: var(--ok-bg); color: var(--s-merged); }
  .pill.adopt { background: var(--ok-bg); color: var(--s-merged); }
  .pill.drop { background: #eef1f4; color: var(--faint); }
  .pill.pending { background: var(--warn-bg); color: #9a6209; }
  .empty { color: var(--faint); font-style: italic; padding: 18px; text-align: center; }
  .tgt { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  @media (prefers-reduced-motion: reduce) { .chev { transition: none; } }
  @media (max-width: 620px) { .feat { grid-template-columns: 1fr; } .meta { text-align: left; } }
</style>

<div class="wrap">
  <div class="topbar">
    <div class="lead">
      <p class="eyebrow">案件 WBS &middot; 網羅 &amp; 課題ビュー</p>
      <h1 id="title">—</h1>
      <div class="sources" id="sources"></div>
    </div>
    <div class="meta">
      <div>更新 <span class="stamp" id="upd-at">—</span></div>
      <div>by <span class="stamp" id="upd-by">—</span></div>
      <button class="btn" id="open-btn" type="button">JSON を開く</button>
      <input type="file" id="file" accept=".json,application/json" hidden>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="filters" id="filters" hidden>
    <span class="grp"><label class="t">領域</label>
      <span class="seg" id="seg-area">
        <button data-area="all" aria-pressed="true">全</button>
        <button data-area="FE" aria-pressed="false">FE</button>
        <button data-area="BE" aria-pressed="false">BE</button>
      </span>
    </span>
    <span class="grp"><label class="t">状態</label>
      <span class="seg" id="seg-status"></span>
    </span>
    <label class="toggle"><input type="checkbox" id="only-blocked"> ブロックのみ</label>
  </div>

  <section>
    <h2>WBS <span class="c" id="wbs-c"></span></h2>
    <div id="tree"></div>
  </section>

  <section>
    <h2>課題表 <span class="c" id="q-c"></span></h2>
    <div class="tbl-wrap" id="q-wrap"></div>
  </section>

  <section>
    <h2>共通化候補 <span class="c" id="cm-c"></span></h2>
    <div class="tbl-wrap" id="cm-wrap"></div>
  </section>
</div>

<script>
const SAMPLE = {
  "案件": "利用者管理リニューアル",
  "要件源": "https://confluence.example.com/PROJ/利用者管理",
  "デザイン源": "https://figma.com/file/abc/利用者管理",
  "着手順根拠": "JIRA PROJ-1200 のストーリー順",
  "更新": { "at": "2026-06-30T10:12:00+09:00", "by": "claude" },
  "画面": [
    { "id": "S1", "name": "利用者一覧", "順序": 1, "機能": [
      { "id": "S1-F1", "name": "検索フィルタ", "tasks": [
        { "領域": "FE", "status": "実装中", "pr": null },
        { "領域": "BE", "status": "PR化済", "pr": "#4821" } ] },
      { "id": "S1-F2", "name": "一覧テーブル表示", "tasks": [
        { "領域": "FE", "status": "未着手", "pr": null },
        { "領域": "BE", "status": "マージ済", "pr": "#4799" } ] },
      { "id": "S1-F3", "name": "CSV エクスポート", "tasks": [
        { "領域": "FE", "status": "未着手", "pr": null },
        { "領域": "BE", "status": "未着手", "pr": null } ] } ] },
    { "id": "S2", "name": "利用者詳細", "順序": 2, "機能": [
      { "id": "S2-F1", "name": "基本情報表示", "tasks": [
        { "領域": "FE", "status": "レビュー中", "pr": "#4830" } ] },
      { "id": "S2-F2", "name": "編集モーダル", "tasks": [
        { "領域": "FE", "status": "未着手", "pr": null },
        { "領域": "BE", "status": "未着手", "pr": null } ] } ] },
    { "id": "S3", "name": "新規作成", "順序": 3, "機能": [
      { "id": "S3-F1", "name": "入力フォーム", "tasks": [
        { "領域": "FE", "status": "未着手", "pr": null },
        { "領域": "BE", "status": "未着手", "pr": null } ] },
      { "id": "S3-F2", "name": "重複チェック", "tasks": [
        { "領域": "FE", "status": "未着手", "pr": null },
        { "領域": "BE", "status": "未着手", "pr": null } ] } ] }
  ],
  "課題": [
    { "id": "Q-01", "内容": "絞り込み条件をページ遷移後も保持するかが要件に無い", "種別": "仕様不明", "確認先": "企画", "status": "open", "解決メモ": "", "ブロック対象": ["S1-F1.FE"] },
    { "id": "Q-02", "内容": "一覧の空状態のデザインが存在しない", "種別": "デザインミス", "確認先": "デザイナー", "status": "確認中", "解決メモ": "", "ブロック対象": ["S1-F2.FE"] },
    { "id": "Q-03", "内容": "編集時の楽観ロック方針(更新日時突合)を要確認", "種別": "技術検討", "確認先": "BE", "status": "open", "解決メモ": "", "ブロック対象": ["S2-F2.FE", "S2-F2.BE"] },
    { "id": "Q-04", "内容": "受給者証番号の形式チェックは既存 util を流用可能", "種別": "既存実装乖離", "確認先": "自己解決", "status": "解決", "解決メモ": "src/utils/validators.ts の isValidRecipientNo を流用する", "ブロック対象": ["S3-F1.FE"] },
    { "id": "Q-05", "内容": "重複チェックの判定キー(氏名+生年月日 か 受給者証番号 か)が不明", "種別": "仕様不明", "確認先": "企画", "status": "open", "解決メモ": "", "ブロック対象": ["S3-F2.FE", "S3-F2.BE"] }
  ],
  "共通化候補": [
    { "id": "C-1", "共有ロジック": "一覧の検索フィルタ状態管理", "対象機能": ["S1-F1"], "推奨": "useSearchFilter フックに切り出し", "判断": "採用" },
    { "id": "C-2", "共有ロジック": "利用者フォームのバリデーション", "対象機能": ["S2-F2", "S3-F1"], "推奨": "userFormSchema を共通化(zod)", "判断": "未" },
    { "id": "C-3", "共有ロジック": "受給者証番号フォーマット", "対象機能": ["S3-F1", "S3-F2"], "推奨": "既存 validators.ts に集約", "判断": "見送り" }
  ]
};

const STATUSES = ["未着手", "実装中", "PR化済", "レビュー中", "マージ済"];
const ST_COLOR = { "未着手": "var(--s-todo)", "実装中": "var(--s-doing)", "PR化済": "var(--s-pr)", "レビュー中": "var(--s-review)", "マージ済": "var(--s-merged)" };
const HUMAN = ["企画", "デザイナー", "BE"];
const $ = (s, r = document) => r.querySelector(s);
const el = (t, c, h) => { const n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; };
const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

let DATA = null, IX = null;
const filter = { area: "all", status: new Set(STATUSES), onlyBlocked: false };

function index(d) {
  const blockedTasks = new Set();   // "S1-F1.FE"
  const taskQ = {};                 // taskKey -> [課題]
  const featCM = {};                // 機能id -> [共通化]
  (d.課題 || []).forEach(q => {
    const human = HUMAN.includes(q.確認先);
    (q.ブロック対象 || []).forEach(k => {
      (taskQ[k] = taskQ[k] || []).push(q);
      if (human && q.status !== "解決") blockedTasks.add(k);
    });
  });
  (d.共通化候補 || []).forEach(c => (c.対象機能 || []).forEach(f => (featCM[f] = featCM[f] || []).push(c)));
  return { blockedTasks, taskQ, featCM };
}

function render(d) {
  DATA = d;
  const ix = IX = index(d);
  $("#title").textContent = d.案件 || "(無題)";
  const src = $("#sources"); src.innerHTML = "";
  const addSrc = (k, v) => { if (!v) return; const w = el("span"); w.appendChild(el("span", "k", k + " ")); const a = el("a"); a.href = v; a.textContent = v.replace(/^https?:\/\//, "").slice(0, 46); a.target = "_blank"; a.rel = "noopener"; w.appendChild(a); src.appendChild(w); };
  addSrc("要件", d.要件源); addSrc("デザイン", d.デザイン源);
  if (d.着手順根拠) { const w = el("span"); w.appendChild(el("span", "k", "着手順 ")); w.appendChild(document.createTextNode(d.着手順根拠)); src.appendChild(w); }
  $("#upd-at").textContent = (d.更新 && d.更新.at) ? d.更新.at.replace("T", " ").replace(/\+.*/, "") : "—";
  $("#upd-by").textContent = (d.更新 && d.更新.by) || "—";

  renderStats(d, ix);
  buildStatusSeg();
  $("#filters").hidden = false;
  renderWbs();
  renderIssues(d);
  renderCommon(d);
}

function renderStats(d, ix) {
  const feats = d.画面.flatMap(s => s.機能 || []);
  const tasks = feats.flatMap(f => (f.tasks || []).map(t => ({ ...t, key: f.id + "." + t.領域 })));
  const byStatus = {}; STATUSES.forEach(s => byStatus[s] = 0);
  tasks.forEach(t => { if (byStatus[t.status] != null) byStatus[t.status]++; });
  const merged = byStatus["マージ済"], total = tasks.length;
  const qs = d.課題 || [];
  const openHuman = qs.filter(q => q.status !== "解決" && HUMAN.includes(q.確認先)).length;
  const openSelf = qs.filter(q => q.status !== "解決" && q.確認先 === "自己解決").length;
  const cmPending = (d.共通化候補 || []).filter(c => c.判断 === "未").length;

  const ramp = '<div class="ramp">' + STATUSES.map(s => byStatus[s] ? `<i style="flex:${byStatus[s]};background:${ST_COLOR[s]}"></i>` : "").join("") + '</div>' +
    '<div class="ramp-legend">' + STATUSES.map(s => `<span><b style="background:${ST_COLOR[s]}"></b>${s} ${byStatus[s]}</span>`).join("") + '</div>';

  $("#stats").innerHTML =
    card(d.画面.length, "画面 / ストーリー") +
    card(feats.length, "機能") +
    `<div class="stat"><div class="n">${merged}/${total}</div><div class="l">タスク マージ済</div>${ramp}</div>` +
    card(ix.blockedTasks.size, "ブロック中タスク", ix.blockedTasks.size > 0) +
    card(openHuman, "要確認(人間系 未解決)", openHuman > 0) +
    card(openSelf + "／" + cmPending, "自己解決残 ／ 共通化未判断");
}
function card(n, l, alert) { return `<div class="stat${alert ? " alert" : ""}"><div class="n">${n}</div><div class="l">${esc(l)}</div></div>`; }

function buildStatusSeg() {
  const seg = $("#seg-status"); if (seg.childElementCount) return;
  const mk = (val, lbl) => { const b = el("button", null, lbl); b.dataset.status = val; b.setAttribute("aria-pressed", "true"); return b; };
  seg.appendChild(mk("all", "全"));
  STATUSES.forEach(s => seg.appendChild(mk(s, s)));
  seg.querySelector('[data-status="all"]').addEventListener("click", () => {
    filter.status = new Set(STATUSES);
    [...seg.children].forEach(b => b.setAttribute("aria-pressed", b.dataset.status === "all" ? "true" : "false"));
    seg.querySelector('[data-status="all"]').setAttribute("aria-pressed", "true");
    applyFilter();
  });
  STATUSES.forEach(s => seg.querySelector(`[data-status="${s}"]`).addEventListener("click", e => {
    const b = e.currentTarget, on = b.getAttribute("aria-pressed") === "true";
    if (on) filter.status.delete(s); else filter.status.add(s);
    b.setAttribute("aria-pressed", on ? "false" : "true");
    seg.querySelector('[data-status="all"]').setAttribute("aria-pressed", filter.status.size === STATUSES.length ? "true" : "false");
    applyFilter();
  }));
}

function renderWbs() {
  const d = DATA, ix = IX;
  const pass = (t, blocked) => (filter.area === "all" || t.領域 === filter.area) && filter.status.has(t.status) && (!filter.onlyBlocked || blocked);
  const rows = [];
  d.画面.slice().sort((a, b) => (a.順序 || 0) - (b.順序 || 0)).forEach(s => {
    const feats = [];
    (s.機能 || []).forEach(f => {
      const vts = (f.tasks || []).filter(t => pass(t, ix.blockedTasks.has(f.id + "." + t.領域)));
      if (vts.length) feats.push([f, vts]);
    });
    const spanScreen = feats.reduce((n, x) => n + x[1].length, 0);
    if (!spanScreen) return;
    const totalTasks = (s.機能 || []).reduce((n, f) => n + (f.tasks || []).length, 0);
    const blkAll = (s.機能 || []).reduce((n, f) => n + (f.tasks || []).filter(t => ix.blockedTasks.has(f.id + "." + t.領域)).length, 0);
    let firstS = true;
    feats.forEach(([f, vts]) => {
      const cm = ix.featCM[f.id] || [];
      let firstF = true;
      vts.forEach(t => {
        const key = f.id + "." + t.領域, blocked = ix.blockedTasks.has(key);
        let r = `<tr class="${blocked ? "blocked" : ""}">`;
        if (firstS) {
          r += `<td class="c-screen" rowspan="${spanScreen}"><span class="ord">${s.順序 ?? "–"}</span> <span class="sid">${esc(s.id)}</span>`
            + `<span class="snm">${esc(s.name)}</span>`
            + `<div class="cnt"><span>${(s.機能 || []).length} 機能 / ${totalTasks} タスク</span>${blkAll ? `<span class="blk">⛔ ブロック ${blkAll}</span>` : ""}</div></td>`;
          firstS = false;
        }
        if (firstF) {
          const chips = cm.length ? `<div class="chips">${cm.map(x => `<span class="chip cm" title="${esc(x.共有ロジック)} → ${esc(x.推奨 || "")}">🔗${esc(x.id)}</span>`).join("")}</div>` : "";
          r += `<td class="c-feat" rowspan="${vts.length}"><span class="fname">${esc(f.name)}</span><span class="fid">${esc(f.id)}</span>${chips}</td>`;
          firstF = false;
        }
        const qs = ix.taskQ[key] || [];
        const qhtml = qs.length
          ? `<div class="chips">${qs.map(q => { const soft = !(q.status !== "解決" && HUMAN.includes(q.確認先)); return `<span class="chip q${soft ? " soft" : ""}" title="[${esc(q.種別)}/${esc(q.確認先)}/${esc(q.status)}] ${esc(q.内容)}">${soft ? "" : "🔒"}${esc(q.id)}</span>`; }).join("")}</div>`
          : `<span style="color:var(--faint)">—</span>`;
        const color = blocked ? "var(--block)" : (ST_COLOR[t.status] || "var(--s-todo)");
        r += `<td class="c-area">${esc(t.領域)}</td>`;
        r += `<td class="c-st"><span class="stbadge"><span class="dot" style="background:${color}"></span>${blocked ? "ブロック" : esc(t.status)}</span></td>`;
        r += `<td class="c-pr">${t.pr ? `<a href="#">${esc(t.pr)}</a>` : `<span style="color:var(--faint)">—</span>`}</td>`;
        r += `<td class="c-q">${qhtml}</td></tr>`;
        rows.push(r);
      });
    });
  });
  $("#tree").innerHTML = rows.length
    ? `<div class="wbs-wrap"><table class="grid"><thead><tr><th>画面 / ストーリー</th><th>機能</th><th>領域</th><th>状態</th><th>PR</th><th>課題</th></tr></thead><tbody>${rows.join("")}</tbody></table></div>`
    : `<div class="tbl-wrap"><div class="empty">条件に一致するタスクがありません</div></div>`;
  $("#wbs-c").textContent = `${d.画面.length} 画面 / ${d.画面.flatMap(s => s.機能 || []).length} 機能`;
}
function applyFilter() { renderWbs(); }

function renderIssues(d) {
  const qs = (d.課題 || []).slice();
  $("#q-c").textContent = qs.length + " 件";
  const wrap = $("#q-wrap");
  if (!qs.length) { wrap.innerHTML = '<div class="empty">課題なし</div>'; return; }
  const order = ["企画", "デザイナー", "BE", "自己解決"];
  qs.sort((a, b) => order.indexOf(a.確認先) - order.indexOf(b.確認先) || a.id.localeCompare(b.id));
  const rows = [];
  let cur = null;
  qs.forEach(q => {
    if (q.確認先 !== cur) { cur = q.確認先; const openN = qs.filter(x => x.確認先 === cur && x.status !== "解決").length; rows.push(`<tr class="grouphdr"><td colspan="6">確認先: ${esc(cur)} &middot; 未解決 ${openN}</td></tr>`); }
    const cls = (q.status !== "解決" && HUMAN.includes(q.確認先)) ? "q-unresolved-human" : "";
    const stp = q.status === "解決" ? "resolved" : q.status === "確認中" ? "checking" : "open";
    rows.push(`<tr class="${cls}"><td class="id">${esc(q.id)}</td><td>${esc(q.内容)}</td><td class="mono">${esc(q.種別)}</td>`
      + `<td><span class="pill ${stp}">${esc(q.status)}</span></td><td>${esc(q.解決メモ) || '<span style="color:var(--faint)">—</span>'}</td>`
      + `<td class="tgt">${(q.ブロック対象 || []).map(esc).join("<br>") || "—"}</td></tr>`);
  });
  wrap.innerHTML = `<table><thead><tr><th>ID</th><th>内容</th><th>種別</th><th>状態</th><th>解決メモ</th><th>ブロック対象</th></tr></thead><tbody>${rows.join("")}</tbody></table>`;
}

function renderCommon(d) {
  const cs = d.共通化候補 || [];
  $("#cm-c").textContent = cs.length + " 件";
  const wrap = $("#cm-wrap");
  if (!cs.length) { wrap.innerHTML = '<div class="empty">共通化候補なし</div>'; return; }
  const pj = j => j === "採用" ? "adopt" : j === "見送り" ? "drop" : "pending";
  const rows = cs.map(c => `<tr><td class="id">${esc(c.id)}</td><td>${esc(c.共有ロジック)}</td>`
    + `<td class="tgt">${(c.対象機能 || []).map(esc).join(", ")}</td><td>${esc(c.推奨)}</td>`
    + `<td><span class="pill ${pj(c.判断)}">${esc(c.判断 || "未")}</span></td></tr>`).join("");
  wrap.innerHTML = `<table><thead><tr><th>ID</th><th>共有ロジック</th><th>対象機能</th><th>推奨アプローチ</th><th>判断</th></tr></thead><tbody>${rows}</tbody></table>`;
}

$("#seg-area").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  filter.area = b.dataset.area;
  [...$("#seg-area").children].forEach(x => x.setAttribute("aria-pressed", x === b ? "true" : "false"));
  applyFilter();
});
$("#only-blocked").addEventListener("change", e => { filter.onlyBlocked = e.target.checked; applyFilter(); });
$("#open-btn").addEventListener("click", () => $("#file").click());
$("#file").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { try { render(JSON.parse(r.result)); } catch (err) { alert("JSON の読み込みに失敗しました: " + err.message); } };
  r.readAsText(f);
});

render(SAMPLE);
</script>
</body>
</html>
