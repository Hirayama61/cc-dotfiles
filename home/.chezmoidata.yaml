# Claude Code 用 chezmoi テンプレートデータ
#
# 役割: settings.json.tmpl から `{{ .claude.* }}` で参照する変数群。
# このファイル自体は $HOME に展開されない(chezmoi 制御ファイル)。
# 編集後は `mise run apply:cc-dotfiles` で反映。

claude:
  permissions:
    # 「Claude が頻繁に叩く」コマンドのみ列挙する。
    # 散発的な利用のものはここに入れず、都度プロンプトで承認する方針。
    allow:
      # ----- Navigation / inspection -----
      - Bash(ls:*)
      - Bash(pwd:*)
      - Bash(cd:*)
      - Bash(echo:*)
      - Bash(grep:*)
      - Bash(rg:*)

      # ----- Git (read-only) -----
      - Bash(git status:*)
      - Bash(git log:*)
      - Bash(git diff:*)

      # ----- Git (write・ローカル限定。push/merge は都度承認) -----
      - Bash(git add:*)
      - Bash(git commit -m:*)

      # ----- dotfiles workflow -----
      - Bash(mise run:*)
      - Bash(chezmoi diff:*)
      - Bash(chezmoi managed:*)

      # ----- Inspection / tooling (read-only) -----
      - Bash(mise registry:*)
      - Bash(brew search:*)
      - Bash(command -v:*)
      - Bash(nvim --version)
      - Bash(claude --version)
      - Bash(jq:*)

      # ----- Filesystem (非破壊なローカル作成/変更。削除・権限変更は含めない) -----
      - Bash(mkdir:*)
      - Bash(touch:*)
      - Bash(cp:*)
      - Bash(mv:*)
      - Bash(ln:*)

      # ----- Docs / web (参照のみ) -----
      - Bash(curl -sL https://code.claude.com/docs/llms.txt)
      - WebFetch(domain:zenn.dev)
      - WebFetch(domain:docs.claude.com)

      # ----- gh (PR ワークフロー) -----
      - Bash(gh pr view:*)
      - Bash(gh pr list:*)
      - Bash(gh pr create:*)

      # ----- Claude Code 内部ツール -----
      - Skill
